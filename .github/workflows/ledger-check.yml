name: ledger-check

# Receipts for math claims: re-run the honest proof-harness on every push/PR and
# FAIL the build if any formula regresses to FAILED, or if the harness output
# disagrees with the committed ledger.json (timestamps ignored).

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  ledger-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip sympy

      - name: Run harness in --check mode (fails on FAILED or on ledger disagreement)
        run: python harness/harness.py --check

      - name: Check retained Kernel Hub contracts
        run: python -m unittest discover -s tests -p "test_*.py"
